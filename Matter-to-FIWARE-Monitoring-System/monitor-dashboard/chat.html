<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Climate Resilience Copilot</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="dashboard.css?v=4">
    <link rel="stylesheet" href="workspace.css?v=2">
    <link rel="stylesheet" href="ops-pages.css?v=3">
</head>
<body class="ops-page ops-chat-page">
<div class="ops-shell">
    <aside data-ops-sidebar></aside>
    <main class="ops-main">
        <header class="ops-topbar">
            <div>
                <span class="ops-kicker">OpenClaw / MCP orchestration</span>
                <h1>AI Operations Chat</h1>
            </div>
            <div class="ops-topbar-status">
                <div class="live-indicator"><span></span> Connected workspace</div>
            </div>
        </header>

        <div class="ops-page-content">
            <section class="chat-panel ops-chat-panel">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="chat-title">OpenClaw AI</div>
                        <div class="chat-subtitle">Climate resilience and electrical fire operations</div>
                    </div>
                </div>
                <div class="chat-quick-actions">
                    <button class="quick-action-btn" onclick="sendQuickAction('What is the fire risk level?')">Fire Risk</button>
                    <button class="quick-action-btn" onclick="sendQuickAction('Show recent alerts')">Alerts</button>
                    <button class="quick-action-btn" onclick="sendQuickAction('Check system status')">Health</button>
                    <button class="quick-action-btn" onclick="sendQuickAction('Simulate critical fire scenario')">Sim Fire</button>
                    <button class="quick-action-btn" onclick="sendQuickAction('Turn off the smart plug')">Emergency Off</button>
                </div>
                <div class="chat-messages" id="chat-messages">
                    <div class="chat-msg bot">
                        <div class="chat-msg-content">Ask about live risk, recent alerts, system health, or controlled device actions.</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Ask about fire risk, alerts, devices..." onkeydown="if(event.key==='Enter')sendChatMessage()">
                    <button class="chat-send-btn" onclick="sendChatMessage()" aria-label="Send message">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                    </button>
                </div>
            </section>
        </div>
    </main>
</div>

<script src="common.js?v=5"></script>
<script src="nav.js?v=3"></script>
<script src="chat.js?v=3"></script>
<script>
    renderOpsSidebar('chat');
    checkOrionConnection();
    checkMCPConnection();
</script>
</body>
</html>
