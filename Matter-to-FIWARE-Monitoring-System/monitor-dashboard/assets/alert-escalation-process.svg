<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc">
<title id="title">Alert escalation process table</title>
<desc id="desc">Process table displayed before starting the demo: Normal → Safe data → Low risk → Continue monitoring; Warning → Temperature, humidity, or power increases → Explain warning → Notify and inspect; Critical → High temperature + high power + high humidity → Critical alert + response procedure → Request approval; Action/Fallback → Approved or timeout reached → Simulated mitigation or escalation → Record ACK/ERROR.</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#101827"/>
    <stop offset="0.52" stop-color="#142133"/>
    <stop offset="1" stop-color="#0c1220"/>
  </linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#000000" flood-opacity="0.34"/>
  </filter>
</defs>
<rect width="1920" height="1080" fill="url(#bg)"/>
<circle cx="1660" cy="125" r="310" fill="#22405f" opacity="0.28"/>
<circle cx="170" cy="980" r="300" fill="#0e6f66" opacity="0.16"/>
<text x="960.0" y="92" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800" fill="#f8fafc">ALERT ESCALATION PROCESS TABLE</text>
<text x="960.0" y="148" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#9fd8ff">Displayed before starting the demo</text>
<rect x="90" y="220" width="1740" height="718" rx="28" fill="#f8fafc" filter="url(#shadow)"/>
<rect x="90" y="220" width="1740" height="86" rx="28" fill="#1f2a44"/>
<rect x="90" y="276" width="1740" height="30" fill="#1f2a44"/>

<text x="247.5" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#ffffff">Status level</text>
<text x="663.0" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#ffffff">Condition / Data</text>
<line x1="405" y1="220" x2="405" y2="938" stroke="#d7dee9" stroke-width="2"/>
<text x="1164.5" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#ffffff">Processing / Explanation</text>
<line x1="921" y1="220" x2="921" y2="938" stroke="#d7dee9" stroke-width="2"/>
<text x="1619.0" y="275" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="800" fill="#ffffff">Next step</text>
<line x1="1408" y1="220" x2="1408" y2="938" stroke="#d7dee9" stroke-width="2"/>
<rect x="90" y="306" width="1740" height="158" fill="#dffcf0" opacity="0.72"/>
<rect x="126" y="351" width="243" height="68" rx="34" fill="#19a974"/>
<text x="247.5" y="395" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="850" fill="#ffffff">Normal</text>
<path d="M 427 369.0 L 455 385.0 L 427 401.0" fill="none" stroke="#0d6b49" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="473" y="394.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Safe data</text>
<path d="M 943 369.0 L 971 385.0 L 943 401.0" fill="none" stroke="#0d6b49" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="989" y="394.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Low risk</text>
<path d="M 1430 369.0 L 1458 385.0 L 1430 401.0" fill="none" stroke="#0d6b49" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="1476" y="394.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Continue monitoring</text>
<rect x="90" y="464" width="1740" height="158" fill="#fff3d8" opacity="0.72"/>
<line x1="90" y1="464" x2="1830" y2="464" stroke="#d7dee9" stroke-width="2"/>
<rect x="126" y="509" width="243" height="68" rx="34" fill="#f5a623"/>
<text x="247.5" y="553" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="850" fill="#ffffff">Warning</text>
<path d="M 427 527.0 L 455 543.0 L 427 559.0" fill="none" stroke="#8a5a00" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="473" y="535.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Temperature, humidity, or power</text>
<text x="473" y="571.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">increases</text>
<path d="M 943 527.0 L 971 543.0 L 943 559.0" fill="none" stroke="#8a5a00" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="989" y="552.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Explain warning</text>
<path d="M 1430 527.0 L 1458 543.0 L 1430 559.0" fill="none" stroke="#8a5a00" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="1476" y="552.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Notify and inspect</text>
<rect x="90" y="622" width="1740" height="158" fill="#ffe1e1" opacity="0.72"/>
<line x1="90" y1="622" x2="1830" y2="622" stroke="#d7dee9" stroke-width="2"/>
<rect x="126" y="667" width="243" height="68" rx="34" fill="#ef4444"/>
<text x="247.5" y="711" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="26" font-weight="850" fill="#ffffff">Critical</text>
<path d="M 427 685.0 L 455 701.0 L 427 717.0" fill="none" stroke="#9f1d1d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="473" y="693.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">High temperature + high power +</text>
<text x="473" y="729.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">high humidity</text>
<path d="M 943 685.0 L 971 701.0 L 943 717.0" fill="none" stroke="#9f1d1d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="989" y="693.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Critical alert + response</text>
<text x="989" y="729.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">procedure</text>
<path d="M 1430 685.0 L 1458 701.0 L 1430 717.0" fill="none" stroke="#9f1d1d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="1476" y="710.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Request approval</text>
<rect x="90" y="780" width="1740" height="158" fill="#eee7ff" opacity="0.72"/>
<line x1="90" y1="780" x2="1830" y2="780" stroke="#d7dee9" stroke-width="2"/>
<rect x="126" y="825" width="243" height="68" rx="34" fill="#7c3aed"/>
<text x="247.5" y="855" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="850" fill="#ffffff">Action/</text>
<text x="247.5" y="883" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="850" fill="#ffffff">Fallback</text>
<path d="M 427 843.0 L 455 859.0 L 427 875.0" fill="none" stroke="#4c1d95" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="473" y="868.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Approved or timeout reached</text>
<path d="M 943 843.0 L 971 859.0 L 943 875.0" fill="none" stroke="#4c1d95" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="989" y="851.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Simulated mitigation or</text>
<text x="989" y="887.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">escalation</text>
<path d="M 1430 843.0 L 1458 859.0 L 1430 875.0" fill="none" stroke="#4c1d95" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<text x="1476" y="868.0" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="740" fill="#102033">Record ACK/ERROR</text>
<text x="960.0" y="1016" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="650" fill="#cbd5e1">Normal → Warning → Critical → Approval/Timeout → ACK/ERROR</text>
</svg>