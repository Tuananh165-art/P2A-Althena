<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulator — Climate Resilience Copilot</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="workspace.css?v=1">
</head>
<body class="workspace-body">
<div class="container">
    <div class="header">
        <h1>Scenario Simulator</h1>
        <p>Test Fire Risk Scenarios — Inject Data &amp; Debug</p>
    </div>
    <div class="status-bar">
        <div class="status-item">
            <span class="status-dot disconnected" id="orion-status"></span>
            <span class="status-label">Orion</span>
            <span id="orion-text">Checking...</span>
        </div>
        <div class="status-item">
            <span class="status-dot disconnected" id="mcp-status"></span>
            <span class="status-label">MCP Agent</span>
            <span id="mcp-text">Checking...</span>
        </div>
        <div class="status-item">
            <span class="status-label">Last update</span>
            <span id="last-update">--</span>
        </div>
    </div>

    <!-- Simulation Controls -->
    <div class="section simulate-section">
        <h3>Scenario Injection</h3>
        <div class="simulate-buttons">
            <button class="btn-simulate btn-normal" onclick="simulateScenario('normal')">Normal</button>
            <button class="btn-simulate btn-warning" onclick="simulateScenario('warning')">Warning</button>
            <button class="btn-simulate btn-critical" onclick="simulateScenario('critical')">Critical</button>
            <button class="btn-simulate btn-evaluate" onclick="triggerEvaluate()">Force Evaluate</button>
        </div>
        <p style="margin-top:12px;color:var(--text-tertiary);font-size:12px;">
            Inject simulated sensor data into Orion, then trigger MCP Agent risk evaluation.
        </p>
    </div>

    <div class="page-grid equal">
    <div class="section debug-section">
        <h3>Raw Entity JSON</h3>
        <pre id="debug-json">Loading...</pre>
    </div>

    <!-- Last Risk Result -->
    <div class="section">
        <h3>Last Risk Evaluation</h3>
        <pre id="risk-json">Loading...</pre>
    </div>
    </div>
</div>

<script src="common.js?v=3"></script>
<script src="nav.js"></script>
<script src="simulator.js"></script>
</body>
</html>
